# Aegis - Configuration
# Topic-centric configuration. Each topic is an independent agent with its own
# categories, search configuration, and Discord channel mappings.

# --- LLM Configuration ---
llm:
  base_url: "https://api.openai.com/v1"       # OpenAI-compatible API endpoint
  api_key: "${LLM_API_KEY}"                     # Or set LLM_API_KEY env var
  model: "gpt-4o-mini"                          # Model name
  temperature: 0.3                              # Lower = more deterministic
  max_tokens: 4096                              # Max tokens per response
  timeout: 60                                   # Request timeout in seconds
  max_retries: 3                                # Retry count on failure

# --- Default Discord Server ---
default_discord:
  bot_token: "${DISCORD_BOT_TOKEN}"             # Or set DISCORD_BOT_TOKEN env var
  guild_id: 0                                   # Your Discord server ID

# --- YouTube Global Settings ---
youtube:
  api_key: "${YOUTUBE_API_KEY}"                 # Or set YOUTUBE_API_KEY env var
  channel_check_interval_minutes: 30            # How often to check monitored channels
  max_results_per_search: 10                    # Results per keyword search
  monitored_channels: []                        # Global channel monitoring (all topics)
    # - channel_id: "UCxxxxxx"
    #   name: "Example Channel"

# --- Web Search Global Settings (Brave Search API) ---
web_search:
  api_key: "${BRAVE_SEARCH_API_KEY}"            # Or set BRAVE_SEARCH_API_KEY env var
  max_results_per_query: 10                     # Results per query

# --- Topics ---
# Each topic is an independent content curation agent.
# The LLM generates search queries from the topic description.
topics:
  - name: "Artificial Intelligence"
    description: >
      Latest developments in artificial intelligence, large language models,
      AI coding assistants, machine learning infrastructure, and autonomous agents
      for developers and power users.
    search:
      youtube:
        enabled: true
        max_results: 10
        interval_minutes: 120
      web:
        enabled: true
        max_results: 10
        interval_minutes: 60
      query_count_per_source: 5
      query_refresh_interval_hours: 24
    categories:
      - name: "LLM Models & Research"
        description: "New language models, benchmarks, research papers, and foundational AI research"
        discord_channel_id: 0
      - name: "AI Tools & Products"
        description: "New AI-powered tools, products, platforms, and services"
        discord_channel_id: 0
      - name: "AI Coding & Development"
        description: "AI coding assistants, code generation, AI-powered IDEs, developer productivity"
        discord_channel_id: 0
      - name: "MLOps & Infrastructure"
        description: "ML operations, model deployment, training infrastructure, AI DevOps"
        discord_channel_id: 0
      - name: "AI Agents & Automation"
        description: "Autonomous AI agents, workflow automation, agentic frameworks"
        discord_channel_id: 0

  - name: "Blockchain & Web3"
    description: >
      Blockchain technology, smart contracts, decentralized finance (DeFi),
      Web3 development, and cryptocurrency infrastructure.
    search:
      youtube:
        enabled: false
      web:
        enabled: true
        max_results: 10
        interval_minutes: 120
      query_count_per_source: 5
      query_refresh_interval_hours: 24
    categories:
      - name: "DeFi & Protocols"
        description: "Decentralized finance platforms, lending, DEXs, and yield farming"
        discord_channel_id: 0
      - name: "Smart Contracts & Development"
        description: "Smart contract development, security audits, and blockchain tooling"
        discord_channel_id: 0
      - name: "Layer 2 & Scaling"
        description: "Layer 2 solutions, rollups, and blockchain scaling technologies"
        discord_channel_id: 0

# --- Content Pipeline ---
pipeline:
  relevance_threshold: 6                        # Minimum relevance score (0-10) to post
  max_content_age_hours: 72                     # Ignore content older than this
  relation_lookback_days: 14                    # How far back to check for related content
  max_relations: 5                              # Max related items to show per post
  batch_size: 5                                 # Process N items at a time

# --- Scheduler ---
scheduler:
  cleanup_interval_hours: 24                    # How often to run cleanup
  content_retention_days: 90                    # Keep content in DB for this long
  max_concurrent_topics: 3                      # Max topics running simultaneously

# --- Dashboard ---
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080

# --- Logging ---
logging:
  level: "INFO"                                 # DEBUG, INFO, WARNING, ERROR
  file: "logs/aegis.log"                         # Log file path (null to disable)
