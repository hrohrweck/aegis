<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aegis{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242735;
            --border: #2e3140;
            --text: #e4e4e7;
            --text-dim: #8b8d98;
            --accent: #7289da;
            --green: #43b581;
            --red: #f04747;
            --orange: #faa61a;
            --purple: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--text-dim); font-size: 0.9rem; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .section h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-dim);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        th {
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover { background: var(--surface2); }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-green { background: rgba(67, 181, 129, 0.2); color: var(--green); }
        .badge-red { background: rgba(240, 71, 71, 0.2); color: var(--red); }
        .badge-orange { background: rgba(250, 166, 26, 0.2); color: var(--orange); }
        .badge-purple { background: rgba(155, 89, 182, 0.2); color: var(--purple); }
        .badge-blue { background: rgba(114, 137, 218, 0.2); color: var(--accent); }
        .badge-dim { background: var(--surface2); color: var(--text-dim); }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .bar-label {
            width: 180px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: right;
            flex-shrink: 0;
        }
        .bar-track {
            flex: 1;
            height: 20px;
            background: var(--surface2);
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .bar-value {
            width: 40px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .pagination a, .pagination span {
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .pagination span.current {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filters select {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .text-truncate {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .bar-label { width: 100px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">Aegis</span>
        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Overview</a>
            <a href="/content" class="{% if '/content' in request.url.path %}active{% endif %}">Content</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
